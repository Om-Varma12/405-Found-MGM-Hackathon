kind = "web"
previewPath = "/"
title = "SYNCFLOW Traffic Control"
version = "1.0.0"
id = "artifacts/syncflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18735

[services.development]
run = "pnpm --filter @workspace/syncflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/syncflow", "run", "build" ]
publicDir = "artifacts/syncflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18735"
BASE_PATH = "/"
